<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An-Nuayeem | Premium Panjabi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .gold-text { color: #d4af37; }
        .product-card { background: #161b2a; border: 1px solid #1e293b; transition: 0.3s; cursor: pointer; }
        .product-card:hover { border-color: #d4af37; }
    </style>
</head>
<body>
    <header class="p-4 border-b border-gray-800 text-center">
        <h1 class="text-2xl font-bold gold-text">AN-NUAYEEM</h1>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-2 md:grid-cols-4 gap-4" id="grid"></main>

    <script>
        const grid = document.getElementById('grid');
        for(let i=1; i<=20; i++) {
            grid.innerHTML += `
                <div onclick="location.href='detail.html?id=${i}'" class="product-card rounded-lg overflow-hidden p-2">
                    <img src="https://via.placeholder.com/400x500?text=Design+${i}" class="w-full h-auto rounded">
                    <div class="p-2 text-center">
                        <p class="text-sm font-semibold">Premium Design ${i}</p>
                        <p class="gold-text">বিস্তারিত দেখুন</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
