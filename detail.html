<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্ট ডিটেইলস | An-Nuayeem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-gray-800 flex items-center">
        <a href="index.html" class="gold-text font-bold">← ফিরে যান</a>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:py-12 flex flex-col md:flex-row gap-8">
        <div class="md:w-1/2 space-y-4">
            <img id="main-img" src="https://via.placeholder.com/600x800/1e293b/d4af37?text=Loading..." class="w-full rounded-2xl border border-gray-800">
            <div class="grid grid-cols-4 gap-2">
                <img onclick="changeImg(this.src)" src="https://via.placeholder.com/150/1e293b/d4af37?text=View+1" class="rounded-lg cursor-pointer border border-gray-700 hover:border-yellow-500">
                <img onclick="changeImg(this.src)" src="https://via.placeholder.com/150/1e293b/d4af37?text=View+2" class="rounded-lg cursor-pointer border border-gray-700 hover:border-yellow-500">
                <img onclick="changeImg(this.src)" src="https://via.placeholder.com/150/1e293b/d4af37?text=View+3" class="rounded-lg cursor-pointer border border-gray-700 hover:border-yellow-500">
            </div>
        </div>

        <div class="md:w-1/2 space-y-6">
            <h1 id="prod-name" class="text-3xl font-bold">পাঞ্জাবির নাম লোড হচ্ছে...</h1>
            <p id="prod-price" class="text-4xl font-bold gold-text">৳ ০০০</p>
            
            <div class="border-y border-gray-800 py-4 space-y-2">
                <p class="text-gray-400">ব্যস্ততার মাঝেও আপনার আভিজাত্য বজায় রাখতে আন-নুয়াইম এর প্রিমিয়াম এই পাঞ্জাবিটি সেরা পছন্দ।</p>
                <ul class="text-sm space-y-1 text-gray-300">
                    <li>✓ প্রিমিয়াম কটন ফেব্রিক</li>
                    <li>✓ আরামদায়ক ফিটিং</li>
                    <li>✓ নিখুঁত এম্ব্রয়ডারি কাজ</li>
                </ul>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold">সাইজ সিলেক্ট করুন:</h3>
                <div class="flex gap-2">
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">38</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">40</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">42</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">44</button>
                </div>
            </div>

            <a href="https://wa.me/8801XXXXXXXXX" class="block w-full text-center py-4 gold-bg text-black font-bold rounded-xl text-lg transition hover:scale-105">হোয়াটসঅ্যাপে অর্ডার দিন</a>
        </div>
    </div>

    <script>
        function changeImg(src) {
            document.getElementById('main-img').src = src;
        }

        // URL থেকে আইডি নিয়ে ডাটা সেট করা (এটি একটি ডেমো লজিক)
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        if(id) {
            document.getElementById('prod-name').innerText = "প্রিমিয়াম পাঞ্জাবি কালেকশন - স্লট " + id;
            document.getElementById('prod-price').innerText = "৳ ১,২৯০";
        }
    </script>

</body>
</html>
