<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | An-Nuayeem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
    </style>
</head>
<body>
    <nav class="p-4 border-b border-gray-800">
        <a href="index.html" class="gold-text">← পিছনে যান</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4 flex flex-col md:flex-row gap-8 mt-10" id="content">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // যদি আইডি থাকে তবে ডাটা দেখাবে
        if(id) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="md:w-1/2">
                    <img src="https://via.placeholder.com/600x800?text=Design+${id}" class="w-full rounded-xl border border-gray-700">
                </div>
                <div class="md:w-1/2 space-y-6">
                    <h1 class="text-3xl font-bold gold-text">এলিগেন্ট পাঞ্জাবি ডিজাইন #${id}</h1>
                    <p class="text-4xl font-bold">৳ ১,২৯০</p>
                    <div class="py-4 border-y border-gray-800 text-gray-400">
                        <p>✓ প্রিমিয়াম কোয়ালিটি কটন</p>
                        <p>✓ আরামদায়ক ফিটিং</p>
                        <p>✓ সারাদেশে হোম ডেলিভারি</p>
                    </div>
                    <a href="https://wa.me/8801XXXXXXXXX?text=সালাম, আমি ডিজাইন নং ${id} পাঞ্জাবিটি কিনতে চাই" 
                       class="block w-full py-4 gold-bg text-black font-bold text-center rounded-lg">
                        হোয়াটসঅ্যাপে অর্ডার করুন
                    </a>
                </div>
            `;
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
