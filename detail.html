<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্ট ডিটেইলস | An-Nuayeem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-gray-800 flex items-center">
        <a href="index.html" class="gold-text font-bold">← ফিরে যান</a>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:py-12 flex flex-col md:flex-row gap-8">
        <div class="md:w-1/2 space-y-4">
            <img id="main-img" src="" class="w-full rounded-2xl border border-gray-800 shadow-2xl">
            <div id="thumb-container" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <div class="md:w-1/2 space-y-6">
            <h1 id="prod-name" class="text-3xl font-bold">পাঞ্জাবির নাম...</h1>
            <p id="prod-price" class="text-4xl font-bold gold-text">৳ ০০০</p>
            
            <div class="border-y border-gray-800 py-4 space-y-2">
                <p class="text-gray-400">ব্যস্ততার মাঝেও আপনার আভিজাত্য বজায় রাখতে আন-নুয়াইম এর প্রিমিয়াম এই পাঞ্জাবিটি সেরা পছন্দ।</p>
                <ul class="text-sm space-y-1 text-gray-300">
                    <li>✓ প্রিমিয়াম ফেব্রিক</li>
                    <li>✓ আরামদায়ক ফিটিং</li>
                    <li>✓ নিখুঁত কাজ</li>
                </ul>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold">সাইজ সিলেক্ট করুন:</h3>
                <div class="flex gap-2">
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">38</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">40</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">42</button>
                    <button class="w-10 h-10 border border-gray-600 rounded flex items-center justify-center hover:bg-yellow-600">44</button>
                </div>
            </div>

            <a id="wa-btn" href="#" class="block w-full text-center py-4 gold-bg text-black font-bold rounded-xl text-lg transition hover:scale-105">হোয়াটসঅ্যাপে অর্ডার দিন</a>
        </div>
    </div>

    <script>
        // ২০টি পাঞ্জাবির আলাদা আলাদা ডাটাবেস
        const productsData = {
            "1": { name: "এম্ব্রয়ডারি প্রিমিয়াম পাঞ্জাবি", price: "৯৯৯", img: "https://via.placeholder.com/600x800/1e293b/d4af37?text=Design+1" },
            "2": { name: "রয়্যাল ব্ল্যাক পাঞ্জাবি", price: "১,২৯৯", img: "https://via.placeholder.com/600x800/000000/d4af37?text=Royal+Black" },
            "3": { name: "সাদা প্রিমিয়াম কটন", price: "১,১০০", img: "https://via.placeholder.com/600x800/ffffff/000000?text=White+Cotton" },
            "4": { name: "ক্লাসিক নেভি ব্লু", price: "৯৫০", img: "https://via.placeholder.com/600x800/000080/ffffff?text=Navy+Blue" },
            "5": { name: "গোল্ডেন সিল্ক এডিশন", price: "২,৫০০", img: "https://via.placeholder.com/600x800/d4af37/000000?text=Golden+Silk" }
            // আপনি এভাবে ২০ পর্যন্ত আইডি বাড়াতে পারবেন
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const product = productsData[id];

        if(product) {
            document.getElementById('prod-name').innerText = product.name;
            document.getElementById('prod-price').innerText = "৳ " + product.price;
            document.getElementById('main-img').src = product.img;
            document.getElementById('wa-btn').href = "https://wa.me/8801XXXXXXXXX?text=আমি এই পাঞ্জাবিটি কিনতে চাই: " + product.name;
            
            // থাম্বনেইল ছবি সেট করা
            const thumbContainer = document.getElementById('thumb-container');
            for(let i=0; i<3; i++) {
                thumbContainer.innerHTML += `<img onclick="document.getElementById('main-img').src=this.src" src="${product.img}" class="rounded-lg cursor-pointer border border-gray-700 hover:border-yellow-500">`;
            }
        } else {
            document.body.innerHTML = "<h1 class='text-center mt-20'>প্রোডাক্ট পাওয়া যায়নি! <a href='index.html' class='text-blue-500'>হোমে ফিরে যান</a></h1>";
        }
    </script>

</body>
</html>
